name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONUTF8: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration test suite
        run: python tetra_first_test.py

      - name: Verify module imports
        run: |
          python -c "from tetra_os_improved import TetraOrchestrator; print('OK base')"
          python -c "from tetra_science_module import ScientificOrchestrator; print('OK science')"
          python -c "from tetra_meta_discovery import MetaDiscoveryOrchestrator; print('OK meta')"
